<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do App</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav>
  <h1>To-Do App</h1>
  <div>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
</nav>

<div class="container">

  <!-- FORM -->
  <form class="to-do" action="/" method="POST">
    <div class="form-group">
      <label>Title:</label>
      <input type="text" name="task" placeholder="Enter a new to-do..." required />
    </div>

    <div class="form-group">
      <label>Description:</label>
      <input type="text" name="description" placeholder="Enter a description..." required />
    </div>

    <button type="submit" class="add-btn">Add</button>
  </form>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Task</th>
        <th>Description</th>
        <th>Status</th>
        <th>Date</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>

      <!-- EMPTY STATE -->
      {% if todos|length == 0 %}
      <tr>
        <td colspan="6">No tasks yet</td>
      </tr>
      {% endif %}

      <!-- DATA LOOP -->
      {% for todo in todos %}
      <tr>
        <td>{{ loop.index }}</td>
        <td>{{ todo.task }}</td>
        <td>{{ todo.description }}</td>

        <td>
          <span class="{% if todo.status == 'Done' %}done{% else %}pending{% endif %}">
            {{ todo.status }}
          </span>
        </td>

        <td>{{ todo.date_created }}</td>

        <td>
          <a href="/update/{{ todo.id }}" class="action-btn update-btn">Update</a>
          <a href="/delete/{{ todo.id }}" class="action-btn delete-btn">Delete</a>
        </td>
      </tr>
      {% endfor %}

    </tbody>
  </table>

</div>

</body>
</html>
